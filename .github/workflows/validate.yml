name: Validate

on:
  pull_request:

permissions:
  contents: read

jobs:
  title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Conventional Commit title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          printf '%s\n' "$PR_TITLE" | grep -Eq '^(feat|fix|refactor|test|chore|docs|build|ci|perf|revert)(\([a-z0-9._/-]+\))?!?: .+'

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: |
          unformatted="$(gofmt -l $(find cmd internal tests tools -type f -name '*.go'))"
          if [ -n "$unformatted" ]; then
            printf 'Unformatted Go files:\n%s\n' "$unformatted"
            exit 1
          fi
      - run: go test ./...
      - run: go vet ./...
      - run: make architecture
      - run: make verify-generated
