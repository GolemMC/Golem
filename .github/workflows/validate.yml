name: Validate

on:
  pull_request:

permissions:
  contents: read

jobs:
  title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Conventional Commit title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          printf '%s\n' "$PR_TITLE" | grep -Eq '^(feat|fix|refactor|test|chore|docs|build|ci|perf|revert|security)(\([a-z0-9._/-]+\))?!?: .+'

  go:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        if: matrix.os == 'ubuntu-latest'
        run: |
          unformatted="$(gofmt -l $(find cmd internal tests tools -type f -name '*.go'))"
          if [ -n "$unformatted" ]; then
            printf 'Unformatted Go files:\n%s\n' "$unformatted"
            exit 1
          fi
      - run: go test ./...
      - run: go vet ./...
      - run: make architecture
        if: matrix.os == 'ubuntu-latest'
      - run: make verify-generated
        if: matrix.os == 'ubuntu-latest'
