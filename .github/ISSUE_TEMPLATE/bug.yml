name: Bug report
description: Report a reproducible Golem problem
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Never upload private worlds, diagnostics tokens, player data, or vulnerability details. Use a copied disposable world and report security issues privately.
  - type: input
    id: version
    attributes:
      label: Golem version or commit
    validations:
      required: true
  - type: input
    id: minecraft
    attributes:
      label: Minecraft version
      placeholder: Java Edition 1.21.1
    validations:
      required: true
  - type: input
    id: operating-system
    attributes:
      label: Operating system
      placeholder: Linux distribution and version
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant sanitized logs
      render: text
  - type: checkboxes
    id: world-copy
    attributes:
      label: World safety
      options:
        - label: I reproduced this with a copied disposable world.
          required: true
